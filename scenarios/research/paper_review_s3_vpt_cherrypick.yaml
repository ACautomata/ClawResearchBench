id: research_paper_review_s3_vpt_cherrypick
name: Paper Review s3-vpt-cherrypick
execution_mode: live
dimension: research
difficulty: hard
benchmark_group: intelligence
benchmark_status: incubating
benchmark_core: false
signal_source: workspace_live
weight: 1.0
timeout_seconds: 300
optimal_steps: 6
pass_threshold: 0.5
tags:
- research
- paper-review
- closed-world
prompt: '当前工作区已经放好了只读输入文件。


  请阅读 materials/input.md 中的材料，按要求完成分析任务。


  任务说明：请执行 paper-review-style-problem-analyzer，检测论文叙事中的选择性报告倾向。


  重要：完成分析后必须将完整 Markdown 正文直接返回在回复中。不得只回复文件路径、''已保存到'' 或 ''任务完成'' 等状态摘要。回复的第一行就应该是 Markdown 正文的标题。


  将完整 Markdown 结果写入 `outputs/s3_vpt_cherrypick.md`。

  基于材料中的证据进行分析，不得编造材料中不存在的数据或结论。'
tools: []
expected_tools: []
ideal_tool_sequence: []
custom_check: research/paper_review_grader.py
custom_check_config:
  output: outputs/s3_vpt_cherrypick.md
  must_contain:
  - 选择性
  - 叙事
  - 强调
  - 弱化
  - '## 0. 文档定位'
  - '## 1. 方法机制、实验支撑与关键前提'
  - '## 2. 核心贡献声明与审稿式质疑'
  - '## 6. 简短结论'
  must_not_contain:
  - 选择性报告不影响结论
  fields:
  - '## 0. 文档定位'
  - '## 1. 方法机制、实验支撑与关键前提'
  - '## 2. 核心贡献声明与审稿式质疑'
  - '## 6. 简短结论'
