category: research_idea_generation
description: Generate structured, evidence-grounded research ideas by synthesizing two synthetic recommender papers.
objective: Produce five required artifacts whose recommendations cite both papers and include a metric, risk, validation experiment, and no fabricated quantitative claims.
prerequisites:
- The workspace is writable.
- "`paper/tinyrec.md` and `paper/sparserec.md` are present."
steps:
- Read both synthetic papers.
- Extract structured paper context.
- Compare evidence across the papers.
- Generate and deduplicate evidence-grounded idea cards.
- Write the final recommended ideas.
expected_outcome: Five artifacts under `idea-runs/ig-001/` with structured ideas grounded in both input papers.
scoring_criteria:
- All five output artifacts exist.
- The final recommendations cite both papers and name a metric, risk, and validation experiment.
- The structured idea cards contain the required fields.
- Quantitative claims are limited to values present in the source papers.
