prompt: |
  当前工作区已经放好了只读输入文件 `materials/edge-reg-abstract.md`，它是目前唯一可用的论文材料。

  请创建 `wiki/domains/bench/papers/edge-reg.md`：
  - 包含完整 frontmatter：`title`、`type: paper`、`domain`、`evidence_level`、`created`、`updated`
  - 包含从 `## 0.` 到 `## 15.` 的全部 16 个编号章节，其中最后一节是 `## 15. 一句话总结`
  - 任何摘要中没有给出的信息都明确写为“论文中未明确说明”
  - 不得使用“可能是”“应该是”等猜测性措辞
  - 一句话总结只能依据输入摘要

