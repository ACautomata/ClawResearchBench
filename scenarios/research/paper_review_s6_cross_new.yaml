  任务说明：审计文档中的质量问题：。专门审计跨阶段一致性问题。请检查：(1) S2 和 S3 之间的核心数字是否一致？(2) S3 标记的高优先级问题是否都被 S4 覆盖？(3) 如果 S4 跳过了某个高优问题，是否有充分说明？


  重要：完成分析后必须将完整 Markdown 正文直接返回在回复中。不得只回复文件路径、''已保存到'' 或 ''任务完成'' 等状态摘要。回复的第一行就应该是 Markdown 正文的标题。


  将完整 Markdown 结果写入 `outputs/s6_cross_new.md`。

  基于材料中的证据进行分析，不得编造材料中不存在的数据或结论。'
