id: research_paper_review_s2_nonstandard
name: Paper Review s2-nonstandard
execution_mode: live
dimension: research
difficulty: hard
benchmark_group: intelligence
benchmark_status: incubating
benchmark_core: false
signal_source: workspace_live
weight: 1.0
timeout_seconds: 300
optimal_steps: 6
pass_threshold: 0.5
tags:
- research
- paper-review
- closed-world
prompt: '当前工作区已经放好了只读输入文件。


  请阅读 materials/input.md 中的材料，按要求完成分析任务。


  任务说明：提取论文中的实验信息：基于 ReAct 论文全文进行实验深化提取。特别注意：论文的实验数据分散在正文多处和附录中，需要整合来自不同位置的信息。


  重要：完成分析后必须将完整 Markdown 正文直接返回在回复中。不得只回复文件路径、''已保存到'' 或 ''任务完成'' 等状态摘要。回复的第一行就应该是 Markdown 正文的标题。


  将完整 Markdown 结果写入 `outputs/s2_nonstandard.md`。

  基于材料中的证据进行分析，不得编造材料中不存在的数据或结论。'
tools: []
expected_tools: []
ideal_tool_sequence: []
custom_check: research/paper_review_grader.py
custom_check_config:
  output: outputs/s2_nonstandard.md
  must_contain:
  - HotpotQA
  - Fever
  - ALFWorld
  - Table 1
  - Table 2
  - 论文中未明确说明
  - 证据强度
  - 具体数值
  - 来源定位
  - '## 0. 文档定位'
  - '## 1. 实验目标与作者想验证的核心结论'
  - '## 2. 实验设置总览'
  - '## 3. 主结果提取'
  - '## 4. 消融实验提取'
  - '## 5. 参数敏感性与稳定性分析'
  - '## 6. 效率、复杂度与资源代价'
  - '## 7. 鲁棒性、泛化性与补充实验'
  - '## 8. 值得关注的实验现象'
  - '## 9. 证据充分性整理'
  - '## 10. 对后续问题发现最有价值的实验信息'
  - '## 11. 一段简短总结'
  must_not_contain: []
  fields:
  - '## 0. 文档定位'
  - '## 1. 实验目标与作者想验证的核心结论'
  - '## 2. 实验设置总览'
  - '## 3. 主结果提取'
  - '## 4. 消融实验提取'
  - '## 5. 参数敏感性与稳定性分析'
  - '## 6. 效率、复杂度与资源代价'
  - '## 7. 鲁棒性、泛化性与补充实验'
  - '## 8. 值得关注的实验现象'
  - '## 9. 证据充分性整理'
  - '## 10. 对后续问题发现最有价值的实验信息'
  - '## 11. 一段简短总结'
workspace_seed_dir: ../../datasets/research/paper_review/s2_nonstandard/fixtures
description: Paper Review s2-nonstandard
objective: Complete the research task grounded only in the seeded input material.
prerequisites:
- The workspace is writable.
- Input material is present in materials/.
steps:
- Read the seeded input material under materials/.
- Complete the requested analysis.
- Write the required output file(s).
expected_outcome: A grounded research artifact matching the deterministic rubric.
scoring_criteria:
- Output file(s) exist.
- Required keywords and section headings are present.
- No forbidden phrases appear.
time_limit: 300
