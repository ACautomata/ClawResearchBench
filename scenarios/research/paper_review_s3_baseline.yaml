prompt: '当前工作区已经放好了只读输入文件。


  请阅读 materials/input.md 中的材料，按要求完成分析任务。


  任务说明：请执行 paper-review-style-problem-analyzer，聚焦于 AdaLoRA 和 LoRA 的对比公平性。特别分析：(1) 2-3x 训练时间是否意味着 LoRA 获得了更少的调参机会？(2) 超参数搜索空间
  5-6 维 vs 2 维是否构成不对等？(3) SVD 参数化带来的增益是否被错误归因于自适应分配？每个问题请给出对应的公平对比反事实设计。


  重要：完成分析后必须将完整 Markdown 正文直接返回在回复中。不得只回复文件路径、''已保存到'' 或 ''任务完成'' 等状态摘要。回复的第一行就应该是 Markdown 正文的标题。


  将完整 Markdown 结果写入 `outputs/s3_baseline.md`。

  基于材料中的证据进行分析，不得编造材料中不存在的数据或结论。'
